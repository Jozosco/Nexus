name: LLM Model Update Monitor

# 새 LLM 모델 감지 시 GitHub Issue 자동 생성 — 역할 배정 검토 트리거 (WBS 연계: LLM 거버넌스)
# HITL §6: 역할 배정 변경은 인간 검토 후 PR로 반영

on:
  schedule:
    - cron: "0 9 * * 1"   # 매주 월요일 09:00 UTC
  workflow_dispatch:        # 수동 실행 허용

jobs:
  check-models:
    name: "LLM Model Update Check (OpenAI · Gemini · Anthropic · Perplexity)"
    runs-on: ubuntu-latest
    permissions:
      issues: write   # 신규 모델 감지 시 Issue 생성

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install openai google-genai anthropic httpx

      - name: Run model comparison
        id: compare
        env:
          OPENAI_API_KEY:      ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          PERPLEXITY_API_KEY:  ${{ secrets.PERPLEXITY_API_KEY }}
        run: python scripts/check_llm_models.py

      - name: Upload diff report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: llm-model-diff-${{ github.run_id }}
          path: model_diff.md
          retention-days: 90

      - name: Write diff to GitHub Step Summary
        if: always()
        run: |
          if [ -f model_diff.md ]; then
            cat model_diff.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Open GitHub Issue if new models found
        if: steps.compare.outputs.new_models_found == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('model_diff.md', 'utf8');
            const date = new Date().toISOString().split('T')[0];
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[LLM Monitor] 신규 모델 감지 — ${date}`,
              body: [
                body,
                '',
                '---',
                '**Action Required**: `config/llm_models.json` 업데이트 및 역할 배정 검토 후 PR 제출',
                '**담당**: C-01 Senior PM + 인간 검토자',
                '**참조**: CLAUDE.md §6 HITL, `.claude/rules/libraries.md`',
              ].join('\n'),
              labels: ['llm-model-update', 'review-required'],
            });
            console.log('✅ GitHub Issue 생성 완료');
