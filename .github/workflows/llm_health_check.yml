name: LLM & Data API Health Check

on:
  schedule:
    - cron: "0 9 * * 1"   # 매주 월요일 오전 9시 (UTC) — 주간 시작 전 확인
  workflow_dispatch:        # 수동 실행 허용

jobs:
  check-llm-apis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install openai google-genai httpx

      # ── LLM APIs ────────────────────────────────────────────────────────────

      - name: Check Perplexity API
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
        run: |
          python - <<'EOF'
          import os
          from openai import OpenAI
          # MEMORY L-006/L-007: 모델명 상수 사용 — 하드코딩 금지
          # 현행 모델명: sonar (구: llama-3.1-sonar-small-128k-online)
          PING_MODEL = "sonar"
          client = OpenAI(
              api_key=os.environ["PERPLEXITY_API_KEY"],
              base_url="https://api.perplexity.ai"
          )
          r = client.chat.completions.create(
              model=PING_MODEL,
              messages=[{"role": "user", "content": "Ping: respond with OK only"}]
          )
          assert "ok" in r.choices[0].message.content.lower(), \
              f"Perplexity 응답 이상: {r.choices[0].message.content}"
          print("✅ Perplexity API 정상")
          EOF

      - name: Check Gemini API
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python - <<'EOF'
          import os
          from google import genai
          # MEMORY L-010: google-generativeai 지원 종료 → google-genai SDK로 전환
          # MEMORY L-011: gemini-2.0-flash 신규 사용자 제한 → gemini-2.5-flash 교체 (2026-06-01 완전 폐기)
          PING_MODEL = "gemini-2.5-flash"
          client = genai.Client(api_key=os.environ["GEMINI_API_KEY"])
          r = client.models.generate_content(model=PING_MODEL, contents="Ping: respond with OK only")
          assert "ok" in r.text.lower(), f"Gemini 응답 이상: {r.text}"
          print("✅ Gemini API 정상")
          EOF

      - name: Check OpenAI API
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python - <<'EOF'
          import os
          from openai import OpenAI
          client = OpenAI(api_key=os.environ["OPENAI_API_KEY"])
          r = client.chat.completions.create(
              model="gpt-4o-mini",
              messages=[{"role": "user", "content": "Ping: respond with OK only"}]
          )
          assert "ok" in r.choices[0].message.content.lower(), \
              f"OpenAI 응답 이상: {r.choices[0].message.content}"
          print("✅ OpenAI API 정상")
          EOF

  # ── Data Source APIs (FRED, EIA, BOK ECOS) ──────────────────────────────────

  check-data-apis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install httpx tradingeconomics

      - name: Check FRED API (Fed Funds Rate endpoint)
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          python - <<'EOF'
          import os, httpx
          api_key = os.environ["FRED_API_KEY"]
          url = (
              "https://api.stlouisfed.org/fred/series"
              f"?series_id=FEDFUNDS&api_key={api_key}&file_type=json"
          )
          r = httpx.get(url, timeout=15)
          r.raise_for_status()
          data = r.json()
          assert "seriess" in data, \
              f"[오류] FRED API 응답 형식 이상: {list(data.keys())}"
          print(f"✅ FRED API 정상 — 시리즈: {data['seriess'][0]['title']}")
          EOF

      - name: Check EIA API (Brent Crude endpoint)
        env:
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
        run: |
          python - <<'EOF'
          import os, httpx
          api_key = os.environ["EIA_API_KEY"]
          url = (
              "https://api.eia.gov/v2/petroleum/pri/spt/data/"
              f"?api_key={api_key}&frequency=daily"
              "&data[0]=value&facets[product][]=EPCBRENT&offset=0&length=1"
          )
          r = httpx.get(url, timeout=15)
          r.raise_for_status()
          data = r.json()
          assert "response" in data, \
              f"[오류] EIA API 응답 형식 이상: {list(data.keys())}"
          print(f"✅ EIA API 정상 — 데이터 포인트 수: {data['response'].get('total', 'N/A')}")
          EOF

      - name: Check BOK ECOS API (KRW/USD rate endpoint)
        env:
          BOK_ECOS_API_KEY: ${{ secrets.BOK_ECOS_API_KEY }}
        run: |
          python - <<'EOF'
          import os, httpx
          api_key = os.environ["BOK_ECOS_API_KEY"]
          # 731Y001 = 외환 / 0000001 = USD/KRW 대고객전신환매도율
          url = (
              f"https://ecos.bok.or.kr/api/KeyStatisticList"
              f"/{api_key}/json/kr/1/3/"
          )
          r = httpx.get(url, timeout=15)
          r.raise_for_status()
          data = r.json()
          assert "KeyStatisticList" in data, \
              f"[오류] BOK ECOS API 응답 형식 이상 (키 오류 또는 인증 실패): {list(data.keys())}"
          count = data["KeyStatisticList"].get("list_total_count", 0)
          assert int(count) > 0, "[오류] BOK ECOS API: 데이터 0건 — API 키 또는 엔드포인트 확인 필요"
          print(f"✅ BOK ECOS API 정상 — 주요 통계 항목 수: {count}")
          EOF

      - name: Check KOSIS API — CPI_KOREA 파라미터 조회 (MEMORY A-010, A-020)
        env:
          KOSIS_API_KEY: ${{ secrets.KOSIS_API_KEY }}
        run: |
          python - <<'EOF'
          import os, httpx
          api_key = os.environ.get("KOSIS_API_KEY", "").strip()
          if not api_key:
              print("⚠️ KOSIS_API_KEY 미등록 — 건너뜀 (kosis.kr 계정 필요)")
              raise SystemExit(0)
          # orgId=101: 통계청 | tblId=DT_1J22003: 소비자물가지수(Nexus CPI_KOREA 소스)
          # parentListId=MT_OTITLE 금지 — vwCd 값이며 parentListId로 사용 시 404 (MEMORY A-020)
          r = httpx.get(
              "https://kosis.kr/openapi/Param/statisticsParamData.do",
              params={
                  "method": "getList", "apiKey": api_key,
                  "itmId": "", "objL1": "", "objL2": "", "objL3": "",
                  "format": "json", "jsonVD": "Y",
                  "vwCd": "MT_ZTITLE", "parentListId": "101",
                  "startPrdDe": "", "endPrdDe": "",
                  "orgId": "101", "tblId": "DT_1J22003",
              },
              timeout=15,
          )
          r.raise_for_status()
          data = r.json()
          assert isinstance(data, list) and len(data) > 0, \
              f"[오류] KOSIS CPI 파라미터 조회 이상 (0건): {data}"
          print(f"✅ KOSIS API 정상 — CPI(DT_1J22003) 파라미터 {len(data)}건 (orgId=101, Nexus CPI_KOREA 소스 확인)")
          EOF

      - name: Check USDA FAS OpenData API (PSD SBO endpoint)
        env:
          USDA_FAS_API_KEY: ${{ secrets.USDA_FAS_API_KEY }}
        run: |
          python - <<'EOF'
          import os, httpx
          api_key = os.environ.get("USDA_FAS_API_KEY", "").strip()
          if not api_key:
              print("⚠️ USDA_FAS_API_KEY 미등록 — 건너뜀 (apps.fas.usda.gov/opendatawebV2 에서 발급)")
              raise SystemExit(0)
          url = "https://apps.fas.usda.gov/OpenData/api/psd/commodity/2222000/country/all/year/2024"
          r = httpx.get(url, headers={"API_KEY": api_key}, timeout=20)
          r.raise_for_status()
          data = r.json()
          assert isinstance(data, list) and len(data) > 0, \
              f"[오류] USDA FAS PSD API: 대두유(2222000) 2024년 데이터 없음"
          print(f"✅ USDA FAS OpenData API 정상 — 대두유 PSD 레코드 {len(data)}건")
          EOF

      - name: Check USDA NASS QuickStats API (Soybean Production endpoint)
        env:
          USDA_NASS_QUICKSTATS_API_KEY: ${{ secrets.USDA_NASS_QUICKSTATS_API_KEY }}
          USDA_API_KEY:                 ${{ secrets.USDA_API_KEY }}
        run: |
          python - <<'EOF'
          import os, httpx
          api_key = (os.environ.get("USDA_NASS_QUICKSTATS_API_KEY") or
                     os.environ.get("USDA_API_KEY") or "").strip()
          if not api_key:
              print("⚠️ USDA_NASS_QUICKSTATS_API_KEY 미등록 — 건너뜀 (quickstats.nass.usda.gov 에서 발급)")
              raise SystemExit(0)
          r = httpx.get(
              "https://quickstats.nass.usda.gov/api/api_GET/",
              params={
                  "key": api_key, "format": "json",
                  "commodity_desc": "SOYBEANS",
                  "statisticcat_desc": "PRODUCTION",
                  "year": "2023", "state_name": "IOWA",
              },
              timeout=20,
          )
          r.raise_for_status()
          data = r.json()
          assert "data" in data and len(data["data"]) > 0, \
              f"[오류] USDA NASS API: 아이오와 대두 생산 데이터 없음. 응답 키: {list(data.keys())}"
          print(f"✅ USDA NASS QuickStats API 정상 — 대두 생산 레코드 {len(data['data'])}건")
          EOF

      - name: Check USDA ARMS API (Soybean Production Cost)
        env:
          USDA_ARM_API_KEY: ${{ secrets.USDA_ARM_API_KEY }}
        run: |
          python - <<'EOF'
          import os, httpx
          api_key = os.environ.get("USDA_ARM_API_KEY", "").strip()
          if not api_key:
              print("⚠️ USDA_ARM_API_KEY 미등록 — 건너뜀 (USDA ERS 계정 신청 필요)")
              raise SystemExit(0)
          r = httpx.get(
              "https://data.ers.usda.gov/api/Data",
              params={
                  "report": "ARMS", "year": "2022",
                  "category": "Production Costs", "crop": "Soybeans",
                  "farmtype": "All farms", "level": "State", "state": "US",
                  "api_key": api_key,
              },
              timeout=20,
          )
          r.raise_for_status()
          data = r.json()
          count = len(data) if isinstance(data, list) else data.get("count", 0)
          assert count > 0, f"[오류] USDA ARMS API 응답 이상 (0건): {list(data.keys()) if isinstance(data, dict) else type(data)}"
          print(f"✅ USDA ARMS API 정상 — 대두 생산비용 레코드 {count}건")
          EOF

      - name: Check ECMWF CDS API (ERA5 connection)
        env:
          ECMWF_API_KEY: ${{ secrets.ECMWF_API_KEY }}
        run: |
          python - <<'EOF'
          import os, httpx
          api_key = os.environ.get("ECMWF_API_KEY", "").strip()
          if not api_key:
              print("⚠️ ECMWF_API_KEY 미등록 — 건너뜀 (cds.climate.copernicus.eu 계정 필요, 형식: uid:key)")
              raise SystemExit(0)
          # ECMWF CDS API — 형식: 'uid:key'
          if ":" in api_key:
              uid, key = api_key.split(":", 1)
              auth_header = {"Authorization": f"Bearer {key}", "X-CDS-API-KEY": api_key}
          else:
              auth_header = {"X-CDS-API-KEY": api_key}
          r = httpx.get(
              "https://cds.climate.copernicus.eu/api/v2/resources/",
              headers=auth_header,
              timeout=20,
          )
          # 200 또는 인증 오류가 아닌 응답이면 연결 정상
          if r.status_code in (200, 403, 404):
              print(f"✅ ECMWF CDS API 연결 정상 (HTTP {r.status_code})")
          else:
              r.raise_for_status()
          EOF

      - name: Check Korea Customs API — data.go.kr HS 1507 (MEMORY A-011, A-018)
        env:
          DATA_GO_KR_SERVICE_KEY: ${{ secrets.DATA_GO_KR_SERVICE_KEY }}
        run: |
          python - <<'EOF'
          import os, json, httpx
          from urllib.parse import unquote
          svc_key = os.environ.get("DATA_GO_KR_SERVICE_KEY", "").strip()
          if not svc_key:
              print("⚠️ DATA_GO_KR_SERVICE_KEY 미등록 — 건너뜀 (data.go.kr에서 관세청 수출입실적 API 신청 필요)")
              raise SystemExit(0)
          # MEMORY A-018: 올바른 파라미터 — strtYymm/endYymm/hsSgn(10단위). 구 파라미터(hsCd/period/pageNo) 사용 금지
          # MEMORY A-015: 이중 인코딩 방지 — unquote() 후 params 전달
          decoded_key = unquote(svc_key)
          r = httpx.get(
              "http://apis.data.go.kr/1220000/nitemtrade/getNitemtradeList",
              params={
                  "serviceKey": decoded_key,
                  "strtYymm": "202501",
                  "endYymm":  "202501",
                  "hsSgn":    "1507901010",  # 정제 식용 대두유 (10단위 필수)
              },
              timeout=20,
          )
          r.raise_for_status()
          try:
              data = r.json()
          except (json.JSONDecodeError, ValueError):
              snippet = r.text[:200].replace("\n", " ")
              raise AssertionError(f"[오류] 관세청 API JSON 파싱 실패 — 파라미터 오류 의심: {snippet}")
          body = data.get("response", {}).get("body", {})
          items = body.get("items", [])
          count = len(items) if isinstance(items, list) else (1 if isinstance(items, dict) else 0)
          print(f"✅ Korea Customs API 정상 — HS 1507901010 2025-01 수입 레코드 {count}건")
          EOF

      - name: Check Trading Economics API (BDI + CPO)
        env:
          TRADING_ECONOMICS_API_KEY: ${{ secrets.TRADING_ECONOMICS_API_KEY }}
        run: |
          python - <<'EOF'
          import os
          te_key = os.environ.get("TRADING_ECONOMICS_API_KEY", "").strip()
          if not te_key:
              print("⚠️ TRADING_ECONOMICS_API_KEY 미등록 — 건너뜀 (tradingeconomics.com, 형식: key:secret)")
              raise SystemExit(0)
          import tradingeconomics as te
          te.login(te_key)
          # BDI 조회 (Baltic Dry Index — C-03 구조적 단절 모니터링 변수)
          try:
              data = te.getMarketsBySymbol(symbols="bdi", output_type="df")
              assert data is not None and len(data) > 0, "[오류] TE BDI 데이터 없음"
              print(f"✅ Trading Economics API 정상 — BDI: {data.iloc[0].get('Last', 'N/A')}")
          except Exception as e:
              # BDI 심볼 확인 필요 시 전체 상품 목록으로 재시도
              data = te.getMarketsData(marketsField="commodities", output_type="df")
              bdi_row = data[data["Symbol"].str.lower().str.contains("bdi|baltic", na=False)] if data is not None else None
              if bdi_row is not None and len(bdi_row) > 0:
                  print(f"✅ Trading Economics API 정상 — BDI 발견 (심볼 재확인 필요): {e}")
              else:
                  raise RuntimeError(f"[오류] Trading Economics BDI 조회 실패: {e}")
          EOF
