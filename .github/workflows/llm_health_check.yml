name: LLM & Data API Health Check

on:
  schedule:
    - cron: "0 9 * * 1"   # 매주 월요일 오전 9시 (UTC) — 주간 시작 전 확인
  workflow_dispatch:        # 수동 실행 허용

jobs:
  check-llm-apis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install openai google-genai httpx

      # ── LLM APIs ────────────────────────────────────────────────────────────

      - name: Check Perplexity API
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
        run: |
          python - <<'EOF'
          import os
          from openai import OpenAI
          # MEMORY L-006/L-007: 모델명 상수 사용 — 하드코딩 금지
          # 현행 모델명: sonar (구: llama-3.1-sonar-small-128k-online)
          PING_MODEL = "sonar"
          client = OpenAI(
              api_key=os.environ["PERPLEXITY_API_KEY"],
              base_url="https://api.perplexity.ai"
          )
          r = client.chat.completions.create(
              model=PING_MODEL,
              messages=[{"role": "user", "content": "Ping: respond with OK only"}]
          )
          assert "ok" in r.choices[0].message.content.lower(), \
              f"Perplexity 응답 이상: {r.choices[0].message.content}"
          print("✅ Perplexity API 정상")
          EOF

      - name: Check Gemini API
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python - <<'EOF'
          import os
          from google import genai
          # MEMORY L-010: google-generativeai 지원 종료 → google-genai SDK로 전환
          # 최신 모델: gemini-2.0-flash (구: gemini-1.5-flash 폐기)
          PING_MODEL = "gemini-2.0-flash"
          client = genai.Client(api_key=os.environ["GEMINI_API_KEY"])
          r = client.models.generate_content(model=PING_MODEL, contents="Ping: respond with OK only")
          assert "ok" in r.text.lower(), f"Gemini 응답 이상: {r.text}"
          print("✅ Gemini API 정상")
          EOF

      - name: Check OpenAI API
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python - <<'EOF'
          import os
          from openai import OpenAI
          client = OpenAI(api_key=os.environ["OPENAI_API_KEY"])
          r = client.chat.completions.create(
              model="gpt-4o-mini",
              messages=[{"role": "user", "content": "Ping: respond with OK only"}]
          )
          assert "ok" in r.choices[0].message.content.lower(), \
              f"OpenAI 응답 이상: {r.choices[0].message.content}"
          print("✅ OpenAI API 정상")
          EOF

  # ── Data Source APIs (FRED, EIA, BOK ECOS) ──────────────────────────────────

  check-data-apis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install httpx

      - name: Check FRED API (Fed Funds Rate endpoint)
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          python - <<'EOF'
          import os, httpx
          api_key = os.environ["FRED_API_KEY"]
          url = (
              "https://api.stlouisfed.org/fred/series"
              f"?series_id=FEDFUNDS&api_key={api_key}&file_type=json"
          )
          r = httpx.get(url, timeout=15)
          r.raise_for_status()
          data = r.json()
          assert "seriess" in data, \
              f"[오류] FRED API 응답 형식 이상: {list(data.keys())}"
          print(f"✅ FRED API 정상 — 시리즈: {data['seriess'][0]['title']}")
          EOF

      - name: Check EIA API (Brent Crude endpoint)
        env:
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
        run: |
          python - <<'EOF'
          import os, httpx
          api_key = os.environ["EIA_API_KEY"]
          url = (
              "https://api.eia.gov/v2/petroleum/pri/spt/data/"
              f"?api_key={api_key}&frequency=daily"
              "&data[0]=value&facets[product][]=EPCBRENT&offset=0&length=1"
          )
          r = httpx.get(url, timeout=15)
          r.raise_for_status()
          data = r.json()
          assert "response" in data, \
              f"[오류] EIA API 응답 형식 이상: {list(data.keys())}"
          print(f"✅ EIA API 정상 — 데이터 포인트 수: {data['response'].get('total', 'N/A')}")
          EOF

      - name: Check BOK ECOS API (KRW/USD rate endpoint)
        env:
          BOK_ECOS_API_KEY: ${{ secrets.BOK_ECOS_API_KEY }}
        run: |
          python - <<'EOF'
          import os, httpx
          api_key = os.environ["BOK_ECOS_API_KEY"]
          # 731Y001 = 외환 / 0000001 = USD/KRW 대고객전신환매도율
          url = (
              f"https://ecos.bok.or.kr/api/KeyStatisticList"
              f"/{api_key}/json/kr/1/3/"
          )
          r = httpx.get(url, timeout=15)
          r.raise_for_status()
          data = r.json()
          assert "KeyStatisticList" in data, \
              f"[오류] BOK ECOS API 응답 형식 이상 (키 오류 또는 인증 실패): {list(data.keys())}"
          count = data["KeyStatisticList"].get("list_total_count", 0)
          assert int(count) > 0, "[오류] BOK ECOS API: 데이터 0건 — API 키 또는 엔드포인트 확인 필요"
          print(f"✅ BOK ECOS API 정상 — 주요 통계 항목 수: {count}")
          EOF
