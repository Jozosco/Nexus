name: Move 2026 GATS Files (one-time)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  move:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Move 2026 GATS 01~04월 files
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git mv "data/2026년 01~04월 미국 對국가별 수출량.xlsx" "data/raw/USDA/FAS/GATS/"
          git mv "data/2026년 01~04월 미국 對국가별 재수출량.xlsx" "data/raw/USDA/FAS/GATS/"
          git commit -m "data: 2026 GATS 01~04월 파일 이동 (data/ → data/raw/USDA/FAS/GATS/)"
          git push origin main
