  #   # ai_quality_validator.py: Claude Haiku 4.5로 각 parquet의 이상값·결측치 탐지 후
  #   # GitHub PR comment 또는 Issues로 자동 리포트 (MCP GitHub 툴 연동)

  # ── Phase B: Snowflake 업로드 (SNOWFLAKE_* Secrets 6종 등록 후 주석 해제) ──────
