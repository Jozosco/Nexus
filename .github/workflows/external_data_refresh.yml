name: External Data Pipeline — Daily Refresh (WBS 1.1.2~1.1.7)

# 실행 환경 주의:
#   Phase A (현재): GitHub Actions runner에서 API 호출 → Azure Blob 저장
#   Phase B (Snowflake 등록 후): Azure ML 파이프라인 트리거로 전환
#
# 보안 경계: 내부 ERP 데이터는 이 워크플로우에서 절대 처리하지 않음

on:
  # 스케줄: 일~목 20:30 UTC = KST 월~금 05:30, 시장 개장 45분 전
  schedule:
    - cron: "30 20 * * 0-4"
  workflow_dispatch:
    # 스케줄 실행: 모든 커넥터 자동 실행 (connector 입력값 무시 — github.event_name == 'schedule' 조건 적용)
    # 수동 실행: connector 선택 가능 (기본값: all). 특정 커넥터만 재실행할 때 사용.
    inputs:
      connector:
        description: "특정 커넥터만 실행 (all / economic / shipping / wasde / climate / gpr / production / commodity / customs)"
        required: false
        default: "all"

jobs:
  # ── WBS 1.1.2: 경제 지표 (Fed / CPI / FX / WTI / 한국 수입 통계) ────────────
  economic-indicators:
    name: "1.1.2 | Economic Indicators (FRED · BOK ECOS · EIA · KOSIS)"
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.connector == 'all' || github.event.inputs.connector == 'economic' || github.event_name == 'schedule' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install httpx pandas pyarrow
      - name: Run economic connector
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
          BOK_ECOS_API_KEY: ${{ secrets.BOK_ECOS_API_KEY }}
          KOSIS_API_KEY: ${{ secrets.KOSIS_API_KEY }}
        run: python src/pipeline/connectors/economic_connector.py
      - name: Upload raw output
        uses: actions/upload-artifact@v4
        with:
          name: economic-indicators-${{ github.run_id }}
          path: data/raw/economic_indicators_*.parquet
          retention-days: 7

  # ── WBS 1.1.3: 해운 지수 (BCAA) ──────────────────────────────────────────
  # 대상 지수: BCAA (Baltic Chemical and Agricultural Oil Assessments) — 식물성유지 탱커 전용
  # 제외 사유: BDI(건화물), SCFI/FBX/WCI/HRCI(컨테이너) — 대두유 액체벌크 선박과 무관 (MEMORY A-013)
  # 직접 API: Baltic Exchange/ICE 기업 구독 필요 → 현행 Perplexity 프록시 유지
  # 유료 전환 시: Trading Economics SDK ($65-200/mo, BDI+CPO 포함) 검토 가능 (MEMORY A-012)
  shipping-indices:
    name: "1.1.3 | Shipping Indices (BCAA via Perplexity — 식물성유지 탱커)"
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.connector == 'all' || github.event.inputs.connector == 'shipping' || github.event_name == 'schedule' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install openai pandas pyarrow
      - name: Run shipping connector
        env:
          PERPLEXITY_API_KEY:          ${{ secrets.PERPLEXITY_API_KEY }}
          TRADING_ECONOMICS_API_KEY:   ${{ secrets.TRADING_ECONOMICS_API_KEY }}
        run: python src/pipeline/connectors/shipping_connector.py
      - name: Upload raw output
        uses: actions/upload-artifact@v4
        with:
          name: shipping-indices-${{ github.run_id }}
          path: data/raw/shipping_indices_*.parquet
          retention-days: 7

  # ── WBS 1.1.4: WASDE / USDA 작황 데이터 ───────────────────────────────────
  wasde-crop-data:
    name: "1.1.4 | WASDE / USDA Crop Data (FAS OpenData · ARMS)"
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.connector == 'all' || github.event.inputs.connector == 'wasde' || github.event_name == 'schedule' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install httpx pandas pyarrow
      - name: Run WASDE connector
        env:
          # FAS OpenData API — header 인증 (구: psdonline → 신: OpenData/api/psd)
          USDA_FAS_API_KEY:     ${{ secrets.USDA_FAS_API_KEY }}
          # 구 키 이름 하위 호환 (점진적 전환)
          USDA_FAS_PSD_API_KEY: ${{ secrets.USDA_FAS_PSD_API_KEY }}
          # USDA ARMS 생산비용 데이터
          USDA_ARM_API_KEY:     ${{ secrets.USDA_ARM_API_KEY }}
        run: python src/pipeline/connectors/wasde_connector.py
      - name: Upload raw output
        uses: actions/upload-artifact@v4
        with:
          name: wasde-crop-${{ github.run_id }}
          path: data/raw/crop_data_*.parquet
          retention-days: 7

  # ── WBS 1.1.5: ENSO / 기상이상 ────────────────────────────────────────────
  climate-enso:
    name: "1.1.5 | Climate & ENSO (NOAA CPC · OpenWeatherMap)"
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.connector == 'all' || github.event.inputs.connector == 'climate' || github.event_name == 'schedule' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install httpx pandas pyarrow
      - name: Run climate connector
        env:
          ECMWF_API_KEY: ${{ secrets.ECMWF_API_KEY }}
          # OPENWEATHERMAP_API_KEY: ${{ secrets.OPENWEATHERMAP_API_KEY }}
          # ⚠️ 미등록: openweathermap.org 무료 키 등록 후 위 줄 주석 해제
          OPENWEATHERMAP_API_KEY: ""
        run: python src/pipeline/connectors/climate_connector.py
      - name: Upload raw output
        uses: actions/upload-artifact@v4
        with:
          name: climate-enso-${{ github.run_id }}
          path: data/raw/climate_data_*.parquet
          retention-days: 7

  # ── WBS 1.1.6: 지정학 리스크 지수 ─────────────────────────────────────────
  geopolitical-risk:
    name: "1.1.6 | Geopolitical Risk Index (GPR public + Perplexity)"
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.connector == 'all' || github.event.inputs.connector == 'gpr' || github.event_name == 'schedule' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install httpx openai pandas pyarrow
      - name: Run GPR connector
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
        run: python src/pipeline/connectors/gpr_connector.py
      - name: Upload raw output
        uses: actions/upload-artifact@v4
        with:
          name: geopolitical-risk-${{ github.run_id }}
          path: data/raw/geopolitical_indices_*.parquet
          retention-days: 7

  # ── WBS 1.1.7: 원산지 생산량·농업기상 + USDA FAS ESR 수출 판매량 ────────────
  # 주의: USDA_FGIS_API_KEY는 이 커넥터와 무관 (FGIS = 원곡 검사, 가공유 미취급, REST API 없음)
  # 대두유 수출 통계: USDA FAS ESR API (apps.fas.usda.gov/OpenData/api/esr) — 인증 불필요
  production-data:
    name: "1.1.7 | Production & Agromet (USDA NASS · FAOSTAT · FAS ESR · NASA POWER · Perplexity)"
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.connector == 'all' || github.event.inputs.connector == 'production' || github.event_name == 'schedule' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install httpx openai pandas pyarrow
      - name: Run production connector
        env:
          # NASS QuickStats — 구 키 이름 유지, USDA_API_KEY로 통합 예정
          USDA_NASS_QUICKSTATS_API_KEY: ${{ secrets.USDA_NASS_QUICKSTATS_API_KEY }}
          USDA_API_KEY:                 ${{ secrets.USDA_API_KEY }}
          PERPLEXITY_API_KEY:           ${{ secrets.PERPLEXITY_API_KEY }}
        run: python src/pipeline/connectors/production_connector.py
      - name: Upload raw output
        uses: actions/upload-artifact@v4
        with:
          name: production-data-${{ github.run_id }}
          path: data/raw/production_data_*.parquet
          retention-days: 7

  # ── WBS 1.1.2 보완: 한국 대두유 수입 통계 (관세청 API — MEMORY A-011) ─────────
  # ATFIS_API_KEY: aT FIS = 식품산업통계, HS코드 수입통계 미제공 (MEMORY A-011)
  # 올바른 출처: 공공데이터포털 관세청 API (DATA_GO_KR_SERVICE_KEY) 또는 UN Comtrade Plus
  customs-import-stats:
    name: "1.1.2+ | Korea Customs HS 1507 Import Stats (data.go.kr · UN Comtrade fallback)"
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.connector == 'all' || github.event.inputs.connector == 'customs' || github.event_name == 'schedule' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install httpx pandas pyarrow
      - name: Run customs connector
        env:
          DATA_GO_KR_SERVICE_KEY: ${{ secrets.DATA_GO_KR_SERVICE_KEY }}
          COMTRADE_API_KEY:        ${{ secrets.COMTRADE_API_KEY }}
        run: python src/pipeline/connectors/customs_connector.py
      - name: Upload raw output
        uses: actions/upload-artifact@v4
        with:
          name: customs-import-${{ github.run_id }}
          path: data/raw/customs_import_*.parquet
          retention-days: 7

  # ── WBS 1.1.2 보완: 상품 가격·가뭄 지수·ARS/USD (D-002 P0 갭 해소) ─────────
  # CBOT BO=F: yfinance(무료, IP차단위험). 유료전환시 Databento/Barchart 권장.
  # ARS/USD: api.bcra.gob.ar 공식 API (인증 불필요).
  # 가뭄 D0-D4: drought.gov USDM API (인증 불필요, 주별 갱신).
  # NASDAQ_DATALINK_API_KEY: BDI·CME_BO1 미제공 — 기타 Nasdaq 데이터셋용으로 보관.
  # TRADING_ECONOMICS_API_KEY: BDI(공식)+CPO 수집 (te_connector.py, 형식 key:secret)
  commodity-prices:
    name: "1.1.2+ | Commodity Prices & Drought (CBOT BO=F · BCRA ARS/USD · USDM · TE CPO)"
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.connector == 'all' || github.event.inputs.connector == 'commodity' || github.event_name == 'schedule' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install httpx yfinance pandas pyarrow tradingeconomics
      - name: Run commodity connector
        env:
          FRED_API_KEY:                ${{ secrets.FRED_API_KEY }}
          NASDAQ_DATALINK_API_KEY:     ${{ secrets.NASDAQ_DATALINK_API_KEY }}
          TRADING_ECONOMICS_API_KEY:   ${{ secrets.TRADING_ECONOMICS_API_KEY }}
        run: python src/pipeline/connectors/commodity_connector.py
      - name: Upload raw output
        uses: actions/upload-artifact@v4
        with:
          name: commodity-prices-${{ github.run_id }}
          path: data/raw/commodity_data_*.parquet
          retention-days: 7

  # ── 파이프라인 완료 요약 + PDF 품질 보고서 (WBS 1.1.8) ──────────────────────
  pipeline-summary:
    name: "Pipeline Summary & Data Quality Report (PDF)"
    runs-on: ubuntu-latest
    needs: [economic-indicators, shipping-indices, wasde-crop-data, climate-enso, geopolitical-risk, production-data, commodity-prices, customs-import-stats]
    if: always()   # 일부 커넥터 실패 시에도 요약 실행
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies (PDF 포함)
        run: |
          sudo apt-get install -y fonts-noto-cjk libpango-1.0-0 libpangocairo-1.0-0
          pip install pandas pyarrow weasyprint
      - uses: actions/download-artifact@v4
        with:
          path: data/raw/
          merge-multiple: true
      - name: Generate GitHub Step Summary
        run: |
          python - <<'PYEOF'
          import os, glob, pandas as pd
          from pathlib import Path
          files = glob.glob("data/raw/**/*.parquet", recursive=True)
          summary = []
          for f in sorted(files):
              try:
                  df = pd.read_parquet(f)
                  null_pct = round(df.isnull().mean().mean() * 100, 1)
                  flag = " ⚠️" if null_pct > 5 else ""
                  summary.append(f"| {Path(f).name} | {len(df)} | {df['ingested_at'].max()} | {null_pct}%{flag} | ✅ |")
              except Exception as e:
                  summary.append(f"| {Path(f).name} | – | – | – | ❌ {e} |")
          md = [
              "## External Data Pipeline — Run Summary",
              f"**Run ID**: {os.environ.get('GITHUB_RUN_ID', 'local')}",
              "",
              "| File | Rows | Ingested At (UTC) | Null% | Status |",
              "|---|---|---|---|---|",
          ] + summary
          print("\n".join(md))
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as f:
              f.write("\n".join(md))
          PYEOF
      - name: Generate PDF & HTML quality report
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: python src/pipeline/report_generator.py
      - name: Upload PDF report
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-quality-report-${{ github.run_id }}
          path: |
            reports/pipeline/pipeline_report_*.pdf
            reports/pipeline/pipeline_report_*.html
          retention-days: 30
          if-no-files-found: warn

  # ── WBS 1.1.8+: C-03 G1 변수 중요도 분석 ───────────────────────────────────
  # C-03 Lead Data Scientist (Claude Opus 4.7 Thinking Mode) — Phase A 기초 분석
  # 입력: pipeline-summary가 수집한 data/raw/*.parquet (최근 7일)
  # 출력: reports/pipeline/g1_variable_importance_{DATE}_{ko|en}.html
  # Phase B: XGBoost+SHAP + Granger 인과검정 + TCN-XGBoost 추가 예정 (30일+ 누적 후)
  g1-analysis:
    name: "C-03 | G1 Variable Importance Analysis (P1-01~04 통합)"
    runs-on: ubuntu-latest
    needs: [pipeline-summary]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install pandas pyarrow scikit-learn statsmodels numpy
      - uses: actions/download-artifact@v4
        with:
          path: data/raw/
          merge-multiple: true
      - name: Run C-03 G1 variable importance analysis
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: python src/forecasting/variable_importance_g1.py 7
      - name: Append G1 summary to GitHub Step Summary
        run: |
          python - <<'PYEOF'
          import os, glob
          from pathlib import Path
          reports = sorted(glob.glob("reports/pipeline/g1_variable_importance_*_ko.html"))
          if reports:
              latest = Path(reports[-1]).name
              with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as f:
                  f.write(f"\n\n## C-03 G1 분석 완료\n리포트: `{latest}`\n")
          PYEOF
      - name: Upload G1 analysis report
        uses: actions/upload-artifact@v4
        with:
          name: g1-variable-importance-${{ github.run_id }}
          path: reports/pipeline/g1_variable_importance_*.html
          retention-days: 30
          if-no-files-found: warn

