name: Historical Data Backfill — 2017~현재 전체 수집 (WBS 1.1.21)

# 목적: 2017년부터 현재까지 데이터를 일괄 수집 → C-08 DQ → C-06 EDA → G1 분석
# 실행 순서: 모든 커넥터 병렬 수집 → backfill-summary → c08-dq → c06-eda → g1-analysis
#
# BACKFILL_MODE=true: 모든 커넥터에 주입 → Perplexity 실시간(오늘 날짜만) 자동 건너뜀
# 실행 조건: workflow_dispatch 수동 실행 전용 (스케줄 없음)
# 예상 소요: ~25분 (커넥터 병렬 ~15분 + C-08/C-06/G1 직렬 ~10분)
#
# HITL 준수: G1 분석은 데이터 이해 목적 — 조달 실행은 별도 CLAUDE.md §6 게이트 통과 필요
# 보안 경계: 내부 ERP 데이터는 이 워크플로우에서 절대 처리하지 않음

on:
  workflow_dispatch:
    inputs:
      start_year:
        description: "수집 시작 연도 (기본: 2017)"
        required: false
        default: "2017"
      end_year:
        description: "수집 종료 연도 (기본: 2025)"
        required: false
        default: "2025"
      connector:
        description: "특정 커넥터만 실행 (all / economic / shipping / wasde / climate / gpr / production / commodity / customs / geointel)"
        required: false
        default: "all"
      skip_analysis:
        description: "수집 후 C-08/C-06/G1 분석 건너뛰기 (true / false)"
        required: false
        default: "false"

jobs:
  # ── WBS 1.1.2: 경제 지표 히스토리 ────────────────────────────────────────────
  economic-backfill:
    name: "1.1.2 | Economic Indicators Backfill (FRED · BOK ECOS · EIA)"
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.connector == 'all' || github.event.inputs.connector == 'economic' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install httpx pandas pyarrow
      - name: Run economic connector (historical)
        env:
          FRED_API_KEY:               ${{ secrets.FRED_API_KEY }}
          EIA_API_KEY:                ${{ secrets.EIA_API_KEY }}
          BOK_ECOS_API_KEY:           ${{ secrets.BOK_ECOS_API_KEY }}
          KOSIS_API_KEY:              ${{ secrets.KOSIS_API_KEY }}
          HISTORICAL_START_YEAR:      ${{ github.event.inputs.start_year }}
          HISTORICAL_END_YEAR:        ${{ github.event.inputs.end_year }}
          BACKFILL_MODE:              "true"
        run: python src/pipeline/connectors/economic_connector.py
      - name: Upload raw output
        uses: actions/upload-artifact@v4
        with:
          name: backfill-economic-${{ github.run_id }}
          path: data/raw/economic_indicators_*.parquet
          retention-days: 90

  # ── WBS 1.1.3: 해운 지수 히스토리 ─────────────────────────────────────────────
  # BACKFILL_MODE=true: BCAA(Perplexity, 오늘만) 건너뜀 → TE BDI 히스토리 / stooq 폴백
  # stooq 폴백: pandas-datareader stooq — API 키 불필요, ^BDI 심볼 사용
  shipping-backfill:
    name: "1.1.3 | Shipping Indices Backfill (BDI via TE → stooq fallback)"
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.connector == 'all' || github.event.inputs.connector == 'shipping' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        # pandas-datareader: stooq BDI 폴백 (TE 키 미등록 시)
        run: pip install openai pandas pyarrow tradingeconomics pandas-datareader
      - name: Run shipping connector (historical)
        env:
          PERPLEXITY_API_KEY:         ${{ secrets.PERPLEXITY_API_KEY }}
          TRADING_ECONOMICS_API_KEY:  ${{ secrets.TRADING_ECONOMICS_API_KEY }}
          HISTORICAL_START_YEAR:      ${{ github.event.inputs.start_year }}
          HISTORICAL_END_YEAR:        ${{ github.event.inputs.end_year }}
          BACKFILL_MODE:              "true"
        run: python src/pipeline/connectors/shipping_connector.py
      - name: Upload raw output
        uses: actions/upload-artifact@v4
        with:
          name: backfill-shipping-${{ github.run_id }}
          path: data/raw/shipping_indices_*.parquet
          retention-days: 90

  # ── WBS 1.1.4: WASDE 히스토리 ─────────────────────────────────────────────────
  wasde-backfill:
    name: "1.1.4 | WASDE / USDA Crop Data Backfill (FAS OpenData)"
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.connector == 'all' || github.event.inputs.connector == 'wasde' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install httpx pandas pyarrow
      - name: Run WASDE connector (historical)
        env:
          USDA_FAS_API_KEY:           ${{ secrets.USDA_FAS_API_KEY }}
          USDA_FAS_PSD_API_KEY:       ${{ secrets.USDA_FAS_PSD_API_KEY }}
          USDA_ARM_API_KEY:           ${{ secrets.USDA_ARM_API_KEY }}
          HISTORICAL_START_YEAR:      ${{ github.event.inputs.start_year }}
          HISTORICAL_END_YEAR:        ${{ github.event.inputs.end_year }}
          BACKFILL_MODE:              "true"
        run: python src/pipeline/connectors/wasde_connector.py
      - name: Upload raw output
        uses: actions/upload-artifact@v4
        with:
          name: backfill-wasde-${{ github.run_id }}
          path: data/raw/crop_data_*.parquet
          retention-days: 90

  # ── WBS 1.1.5: 기후 히스토리 — Open-Meteo ERA5-Land 12개 생산지역 ──────────────
  # API 키 불필요. BACKFILL_MODE: 시작일 = HISTORICAL_START_YEAR-01-01
  climate-backfill:
    name: "1.1.5 | Climate Backfill — Open-Meteo ERA5-Land (12 Production Regions)"
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.connector == 'all' || github.event.inputs.connector == 'climate' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install httpx pandas pyarrow
      - name: Run climate connector (historical)
        env:
          ECMWF_API_KEY:              ${{ secrets.ECMWF_API_KEY }}
          OPENWEATHERMAP_API_KEY:     ""
          HISTORICAL_START_YEAR:      ${{ github.event.inputs.start_year }}
          HISTORICAL_END_YEAR:        ${{ github.event.inputs.end_year }}
          BACKFILL_MODE:              "true"
        run: python src/pipeline/connectors/climate_connector.py
      - name: Upload raw output
        uses: actions/upload-artifact@v4
        with:
          name: backfill-climate-${{ github.run_id }}
          path: data/raw/climate_data_*.parquet
          retention-days: 90

  # ── WBS 1.1.6: GPR 지수 히스토리 ──────────────────────────────────────────────
  # BACKFILL_MODE=true: Perplexity 실시간(오늘만) 건너뜀 → C&I 공개 xlsx만 수집
  # openpyxl 필수: pd.read_excel()로 Caldara & Iacoviello GPR xlsx 파싱 (MEMORY A-030)
  gpr-backfill:
    name: "1.1.6 | GPR Backfill (Caldara & Iacoviello — 공개 xlsx, 1985-현재)"
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.connector == 'all' || github.event.inputs.connector == 'gpr' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install httpx openai pandas pyarrow openpyxl
      - name: Run GPR connector (historical — Perplexity 건너뜀)
        env:
          PERPLEXITY_API_KEY:         ${{ secrets.PERPLEXITY_API_KEY }}
          HISTORICAL_START_YEAR:      ${{ github.event.inputs.start_year }}
          HISTORICAL_END_YEAR:        ${{ github.event.inputs.end_year }}
          BACKFILL_MODE:              "true"
        run: python src/pipeline/connectors/gpr_connector.py
      - name: Upload raw output
        uses: actions/upload-artifact@v4
        with:
          name: backfill-gpr-${{ github.run_id }}
          path: data/raw/geopolitical_indices_*.parquet
          retention-days: 90

  # ── WBS 1.1.7: 생산량 히스토리 ───────────────────────────────────────────────
  production-backfill:
    name: "1.1.7 | Production & Agromet Backfill (USDA NASS · FAOSTAT · FAS ESR)"
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.connector == 'all' || github.event.inputs.connector == 'production' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install httpx openai pandas pyarrow
      - name: Run production connector (historical)
        env:
          USDA_NASS_QUICKSTATS_API_KEY: ${{ secrets.USDA_NASS_QUICKSTATS_API_KEY }}
          USDA_API_KEY:               ${{ secrets.USDA_API_KEY }}
          PERPLEXITY_API_KEY:         ${{ secrets.PERPLEXITY_API_KEY }}
          HISTORICAL_START_YEAR:      ${{ github.event.inputs.start_year }}
          HISTORICAL_END_YEAR:        ${{ github.event.inputs.end_year }}
          BACKFILL_MODE:              "true"
        run: python src/pipeline/connectors/production_connector.py
      - name: Upload raw output
        uses: actions/upload-artifact@v4
        with:
          name: backfill-production-${{ github.run_id }}
          path: data/raw/production_data_*.parquet
          retention-days: 90

  # ── 상품 가격 히스토리 ────────────────────────────────────────────────────────
  commodity-backfill:
    name: "Commodity Prices Backfill (CBOT BO=F · ARS/USD · USDM Drought)"
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.connector == 'all' || github.event.inputs.connector == 'commodity' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install httpx yfinance pandas pyarrow tradingeconomics
      - name: Run commodity connector (historical)
        env:
          FRED_API_KEY:               ${{ secrets.FRED_API_KEY }}
          NASDAQ_DATALINK_API_KEY:    ${{ secrets.NASDAQ_DATALINK_API_KEY }}
          TRADING_ECONOMICS_API_KEY:  ${{ secrets.TRADING_ECONOMICS_API_KEY }}
          HISTORICAL_START_YEAR:      ${{ github.event.inputs.start_year }}
          HISTORICAL_END_YEAR:        ${{ github.event.inputs.end_year }}
          BACKFILL_MODE:              "true"
        run: python src/pipeline/connectors/commodity_connector.py
      - name: Upload raw output
        uses: actions/upload-artifact@v4
        with:
          name: backfill-commodity-${{ github.run_id }}
          path: data/raw/commodity_data_*.parquet
          retention-days: 90

  # ── WBS 1.1.2+: 관세청 수입통계 히스토리 ──────────────────────────────────────
  customs-backfill:
    name: "1.1.2+ | Korea Customs HS 1507 Import Backfill (data.go.kr)"
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.connector == 'all' || github.event.inputs.connector == 'customs' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install httpx pandas pyarrow comtradeapicall
      - name: Run customs connector (historical backfill)
        env:
          DATA_GO_KR_SERVICE_KEY:     ${{ secrets.DATA_GO_KR_SERVICE_KEY }}
          UN_COMTRADE_API_KEY:        ${{ secrets.UN_COMTRADE_API_KEY }}
          HISTORICAL_START_YEAR:      ${{ github.event.inputs.start_year }}
          HISTORICAL_END_YEAR:        ${{ github.event.inputs.end_year }}
          BACKFILL_MODE:              "true"
        run: python src/pipeline/connectors/customs_connector.py
      - name: Upload raw output
        uses: actions/upload-artifact@v4
        with:
          name: backfill-customs-${{ github.run_id }}
          path: data/raw/customs_import_*.parquet
          retention-days: 90

  # ── WBS 1.4.1: GPR × SBO 상관관계 분석 (백필 완료 후 실행) ───────────────────
  gpr-sbo-correlation:
    name: "1.4.1 | GPR × SBO Correlation Analysis (Post-Backfill)"
    runs-on: ubuntu-latest
    needs:
      - economic-backfill
      - gpr-backfill
      - commodity-backfill
    if: ${{ always() && github.event.inputs.skip_analysis != 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install pandas pyarrow numpy
      - uses: actions/download-artifact@v4
        with:
          path: data/raw/
          merge-multiple: true
      - name: Run GPR × SBO correlation analysis
        run: python src/forecasting/gpr_sbo_correlation.py
      - name: Upload correlation report
        uses: actions/upload-artifact@v4
        with:
          name: backfill-gpr-sbo-correlation-${{ github.run_id }}
          path: reports/pipeline/gpr_sbo_correlation_*.html
          retention-days: 90

  # ── 백필 완료 요약 + Excel 내보내기 ──────────────────────────────────────────
  backfill-summary:
    name: "Backfill Summary Report + Excel Export"
    runs-on: ubuntu-latest
    needs:
      - economic-backfill
      - shipping-backfill
      - wasde-backfill
      - climate-backfill
      - gpr-backfill
      - production-backfill
      - commodity-backfill
      - customs-backfill
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install pandas pyarrow openpyxl
      - uses: actions/download-artifact@v4
        with:
          path: data/raw/
          merge-multiple: true
      - name: Generate backfill summary
        run: |
          python - <<'PYEOF'
          import os, glob
          from pathlib import Path
          import pandas as pd

          start_year = "${{ github.event.inputs.start_year }}"
          end_year   = "${{ github.event.inputs.end_year }}"

          files = glob.glob("data/raw/**/*.parquet", recursive=True) + glob.glob("data/raw/*.parquet")
          summary = []
          total_rows = 0
          for f in sorted(files):
              try:
                  df = pd.read_parquet(f)
                  rows = len(df)
                  total_rows += rows
                  date_col = next((c for c in ["price_date", "ingested_at"] if c in df.columns), None)
                  date_range = ""
                  if date_col:
                      mn = pd.to_datetime(df[date_col], errors="coerce").min()
                      mx = pd.to_datetime(df[date_col], errors="coerce").max()
                      date_range = f"{mn.date()} ~ {mx.date()}" if pd.notna(mn) else "N/A"
                  summary.append(f"| {Path(f).name} | {rows:,} | {date_range} | ✅ |")
              except Exception as e:
                  summary.append(f"| {Path(f).name} | – | – | ❌ {e} |")

          md = [
              f"## 과거 데이터 백필 완료 — {start_year}~{end_year}",
              f"**총 수집 레코드**: {total_rows:,}건  |  **Run ID**: {os.environ.get('GITHUB_RUN_ID', 'local')}",
              "",
              "| 파일 | 행 수 | 기간 | 상태 |",
              "|---|---|---|---|",
          ] + summary + [
              "",
              "### 다음 단계",
              "1. ✅ C-08 DQSOps 데이터 품질 검증 (아래 job)",
              "2. ✅ C-06 EDA 검증 — 이상치·결측치 프로파일",
              "3. ✅ G1 변수 중요도 분석 (5년 데이터 기반)",
          ]
          print("\n".join(md))
          gh_summary = os.environ.get("GITHUB_STEP_SUMMARY", "")
          if gh_summary:
              with open(gh_summary, "a") as fh:
                  fh.write("\n".join(md))
          PYEOF
      - name: Export parquet → Excel (다운로드용)
        run: python src/pipeline/export_data.py
      - name: Upload merged backfill dataset (Parquet + Excel)
        uses: actions/upload-artifact@v4
        with:
          name: backfill-all-${{ github.run_id }}
          path: |
            data/raw/*.parquet
            data/exports/*.xlsx
          retention-days: 90
          if-no-files-found: warn

  # ── C-08 DQSOps 데이터 품질 검증 (backfill-summary 후 1차 게이트) ───────────────
  c08-dq-validation:
    name: "C-08 | DQSOps Data Quality Validation Gate"
    runs-on: ubuntu-latest
    needs: [backfill-summary]
    if: always() && github.event.inputs.skip_analysis != 'true'
    outputs:
      overall_status: ${{ steps.dq.outputs.overall_status }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install pandas pyarrow numpy
      - uses: actions/download-artifact@v4
        with:
          path: data/raw/
          merge-multiple: true
      - name: Run C-08 DQSOps validation
        id: dq
        run: python src/pipeline/validators/c08_dq_validator.py
      - name: Upload C-08 DQ report
        uses: actions/upload-artifact@v4
        with:
          name: c08-dq-report-backfill-${{ github.run_id }}
          path: reports/data_quality/dq_report_*.json
          retention-days: 90
          if-no-files-found: warn

  # ── C-06 EDA 검증 (C-08 DQ 통과 후 2차 게이트) ──────────────────────────────
  c06-eda-validation:
    name: "C-06 | EDA Validation — Data Integrity Gate"
    runs-on: ubuntu-latest
    needs: [c08-dq-validation]
    if: always() && github.event.inputs.skip_analysis != 'true'
    outputs:
      eda_status: ${{ steps.eda.outputs.eda_status }}
      stale_connectors: ${{ steps.eda.outputs.stale_connectors }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install pandas pyarrow numpy scipy
      - uses: actions/download-artifact@v4
        with:
          path: data/raw/
          merge-multiple: true
      - name: Run C-06 EDA validation
        id: eda
        run: |
          python - <<'PYEOF'
          import os, glob, json
          from pathlib import Path
          from datetime import date, timedelta
          import numpy as np
          import pandas as pd

          OUTPUT_DIR = "reports/pipeline"
          os.makedirs(OUTPUT_DIR, exist_ok=True)
          today = date.today()
          # 백필 데이터: 과거 데이터이므로 신선도 기준을 수집 시각(ingested_at) 기준으로 적용
          stale_threshold = 1  # ingested_at 기준 1일 이내면 신선 (백필 직후)

          results = {}
          stale = []
          for f in sorted(glob.glob("data/raw/**/*.parquet", recursive=True)
                          + glob.glob("data/raw/*.parquet")):
              name = Path(f).stem
              try:
                  df = pd.read_parquet(f)
              except Exception as e:
                  results[name] = {"status": "READ_ERROR", "error": str(e)}
                  continue
              null_pct = float(df.isnull().mean().mean() * 100)
              freshness = "OK"
              if "ingested_at" in df.columns:
                  max_ts = pd.to_datetime(df["ingested_at"], utc=True, errors="coerce").max()
                  if pd.notna(max_ts):
                      hours_since = (pd.Timestamp.utcnow() - max_ts).total_seconds() / 3600
                      if hours_since > 24:
                          freshness = f"STALE_{int(hours_since)}h"
                          stale.append(name)
              # 날짜 범위 확인 (과거 데이터가 제대로 수집됐는지)
              price_date_range = {}
              if "price_date" in df.columns:
                  dates = pd.to_datetime(df["price_date"], errors="coerce").dropna()
                  if not dates.empty:
                      price_date_range = {"min": str(dates.min().date()), "max": str(dates.max().date()), "unique_dates": int(dates.nunique())}
              num_cols = df.select_dtypes(include="number").columns.tolist()
              outlier_flags = {}
              for col in num_cols[:10]:
                  vals = pd.to_numeric(df[col], errors="coerce").dropna()
                  if len(vals) > 5:
                      z = (vals - vals.mean()) / vals.std()
                      outlier_count = int((z.abs() > 3).sum())
                      if outlier_count:
                          outlier_flags[col] = outlier_count
              results[name] = {
                  "status": "STALE" if "STALE" in freshness else ("WARN" if null_pct > 5 else "OK"),
                  "rows": len(df), "null_pct": round(null_pct, 1),
                  "freshness": freshness,
                  "price_date_range": price_date_range,
                  "outlier_cols": outlier_flags,
              }
              if null_pct > 5:
                  print(f"[C-06 경고] {name}: 결측치 {null_pct:.1f}%")
              if outlier_flags:
                  print(f"[C-06 경고] {name}: Z>3 이상치: {outlier_flags}")
              if price_date_range:
                  dates_cnt = price_date_range.get('unique_dates', 0)
                  print(f"[C-06 정보] {name}: {price_date_range.get('min')} ~ {price_date_range.get('max')} ({dates_cnt}개 날짜)")

          report = {"run_date": today.isoformat(), "mode": "BACKFILL", "connectors": results,
                    "stale": stale, "overall": "PASS" if not stale else "WARN"}
          out = f"{OUTPUT_DIR}/c06_eda_report_{today.strftime('%Y%m%d')}_backfill.json"
          with open(out, "w") as fh:
              json.dump(report, fh, ensure_ascii=False, indent=2)
          print(f"[C-06 완료] EDA 검증 보고서 → {out}")
          gh_output = os.environ.get("GITHUB_OUTPUT", "")
          if gh_output:
              with open(gh_output, "a") as fh:
                  fh.write(f"eda_status={'WARN' if stale else 'PASS'}\n")
                  fh.write(f"stale_connectors={','.join(stale) or 'none'}\n")
          PYEOF
      - name: Upload C-06 EDA report
        uses: actions/upload-artifact@v4
        with:
          name: c06-eda-report-backfill-${{ github.run_id }}
          path: reports/pipeline/c06_eda_report_*_backfill.json
          retention-days: 90
          if-no-files-found: warn

  # ── G1 변수 중요도 분석 (5년 히스토리 기반 — C-06 게이트 통과 후) ────────────────
  # 5년 데이터를 사용하므로 days=1825 (5년치 parquet 전체 로드)
  g1-analysis:
    name: "C-03 | G1 Variable Importance Analysis (5-Year Backfill Dataset)"
    runs-on: ubuntu-latest
    needs: [c06-eda-validation]
    if: always() && github.event.inputs.skip_analysis != 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          sudo apt-get install -y fonts-noto-cjk libpango-1.0-0 libpangocairo-1.0-0 2>/dev/null || true
          pip install pandas pyarrow scikit-learn statsmodels numpy weasyprint markdown2
      - uses: actions/download-artifact@v4
        with:
          path: data/raw/
          merge-multiple: true
      - name: Run C-03 G1 variable importance analysis (5-year window)
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: python src/forecasting/variable_importance_g1.py 1825
      - name: Generate Markdown + PDF reports
        run: python scripts/generate_research_pdf.py reports/pipeline
      - name: Append G1 summary to Step Summary
        run: |
          python - <<'PYEOF'
          import os, glob
          from pathlib import Path
          reports = sorted(glob.glob("reports/pipeline/g1_variable_importance_*_ko.html"))
          if reports:
              latest = Path(reports[-1]).name
              with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as f:
                  f.write(f"\n\n## C-03 G1 분석 완료 (5년 백필 기반)\n리포트: `{latest}`\n")
                  f.write("\n**HITL 게이트**: G1 분석은 데이터 이해 목적. 조달 결정은 CLAUDE.md §6 HITL 프로세스 필요.\n")
          PYEOF
      - name: Upload G1 analysis reports (HTML + PDF)
        uses: actions/upload-artifact@v4
        with:
          name: g1-backfill-report-${{ github.run_id }}
          path: |
            reports/pipeline/g1_variable_importance_*.html
            reports/pipeline/g1_variable_importance_*.pdf
          retention-days: 90
          if-no-files-found: warn
