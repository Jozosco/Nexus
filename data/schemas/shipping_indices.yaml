dataset: shipping_indices
source_connector: src/pipeline/connectors/shipping_connector.py
output_path: data/raw/shipping_indices_YYYYMMDD.parquet
description: "BCAA (Baltic Chemical & Agricultural Oil Assessments) · BDI (Baltic Dry Index) (WBS 1.1.3)"
note: "BCAA: Perplexity 프록시 (Phase B에서 Baltic Exchange/ICE 직접 구독 예정). BDI: Trading Economics 공식 수집. SCFI/FBX/WCI/HRCI 제외 (컨테이너 운임 — 대두유 액체 벌크와 무관, MEMORY A-013)"

columns:
  - name: price_date
    dtype: datetime64[ns]
    nullable: false
    description: "수집일 (Perplexity 응답 기준 today)"

  - name: source_name
    dtype: object
    nullable: false
    description: "데이터 출처 (Perplexity/BalticExchange | Perplexity/SSE)"

  - name: indicator_code
    dtype: object
    nullable: false
    description: "지표 코드 (BDI | SCFI)"

  - name: value
    dtype: float64
    nullable: false
    description: "지수 포인트"

  - name: unit
    dtype: object
    nullable: true
    description: "points"

  - name: note
    dtype: object
    nullable: true
    description: "프록시 표시 ([PERPLEXITY-PROXY: B-003 블로커])"

  - name: ingested_at
    dtype: datetime64[ns]
    nullable: false
    description: "수집 시각 (UTC)"
